services:
  php:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./htdocs/:/var/www/html
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql